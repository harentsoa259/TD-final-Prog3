openapi: 3.1.0
info:
  title: Agricultural federation API
  description: |
    # Versioning
    - v0.0.1 (2026-04-21) : POST /collectivities and POST /members creation.
    - v0.0.2 (2026-04-22) : PATCH /collectivities/{id}/identity for unique name and number assignment (Feature J).
  version: 0.0.2
servers:
  - url: 'https://localhost:8080'
paths:
  '/collectivities':
    post:
      summary: Create list of collectivities
      description: |
        Lors de la création, la collectivité n'a pas encore de nom ni de numéro officiel. 
        Ceux-ci seront attribués plus tard par la fédération via le point d'entrée dédié.
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/CreateCollectivity'
      responses:
        201:
          description: List of created collectivities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Collectivity'
        400:
          description: Collectivity without federation approval or structure missing.
        404:
          description: Member not found.

  # --- AJOUT FONCTIONNALITÉ J ---
  '/collectivities/{id}/identity':
    patch:
      summary: Attribution du nom et numéro unique par la fédération
      description: |
        Permet à la fédération d'attribuer officiellement un nom et un numéro à une collectivité. 
        RÈGLE MÉTIER : Une fois ces informations enregistrées, elles deviennent immuables. 
        Toute tentative de modification ultérieure retournera une erreur.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, number]
              properties:
                name:
                  type: string
                  example: "Fédération Rizicole de l'Alaotra"
                number:
                  type: string
                  example: "FED-MG-2026-042"
      responses:
        200:
          description: Identité attribuée et verrouillée avec succès.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collectivity'
        403:
          description: Interdit - Le nom ou le numéro a déjà été attribué et ne peut plus être changé.
        404:
          description: Collectivité non trouvée.
        409:
          description: Conflit - Le nom ou le numéro est déjà utilisé par une autre collectivité.

  '/members':
    post:
      summary: Create list of members
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/CreateMember'
      responses:
        201:
          description: List of created members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Member'
        400:
          description: |
            Cas d'erreur : 
            - Parrainage invalide (moins de 2 parrains, ancienneté < 90j, etc.).
            - Frais d'adhésion ou cotisations non payés.
        404:
          description: Collectivité ou membre parrain non trouvé.

components:
  schemas:
    CreateCollectivity:
      type: object
      properties:
        location:
          type: string
        members:
          type: array
          items:
            $ref: '#/components/schemas/MemberIdentifier'
        federationApproval:
          type: boolean
        structure:
          $ref: '#/components/schemas/CreateCollectivityStructure'
    
    CreateCollectivityStructure:
      type: object
      properties:
        president:
          $ref: '#/components/schemas/MemberIdentifier'
        vicePresident:
          $ref: '#/components/schemas/MemberIdentifier'
        treasurer:
          $ref: '#/components/schemas/MemberIdentifier'
        secretary:
          $ref: '#/components/schemas/MemberIdentifier'
    
    CollectivityStructure:
      type: object
      properties:
        president:
          $ref: '#/components/schemas/Member'
        vicePresident:
          $ref: '#/components/schemas/Member'
        treasurer:
          $ref: '#/components/schemas/Member'
        secretary:
          $ref: '#/components/schemas/Member'
    
    Collectivity:
      type: object
      properties:
        id:
          type: string
        name: # Implémentation J
          type: string
          nullable: true
        number: # Implémentation J
          type: string
          nullable: true
        location:
          type: string
        structure:
          $ref: '#/components/schemas/CollectivityStructure'
        members:
          type: array
          items:
            $ref: '#/components/schemas/Member'
    
    MemberIdentifier:
      type: string
    
    CreateMember:
      type: object
      allOf:
        - $ref: '#/components/schemas/MemberInformation'
      properties:
        collectivityIdentifier:
          type: string
        referees:
          type: array
          items:
            $ref: '#/components/schemas/MemberIdentifier'
        registrationFeePaid:
          type: boolean
        membershipDuesPaid:
          type: boolean
    
    MemberInformation:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        birthDate:
          type: string
          format: date
        gender:
          $ref: '#/components/schemas/Gender'
        address:
          type: string
        profession:
          type: string
        phoneNumber:
          type: integer
        email:
          type: string
        occupation:
          $ref: '#/components/schemas/MemberOccupation'
    
    Member:
      type: object
      allOf:
        - $ref: '#/components/schemas/MemberInformation'
      properties:
        id:
          $ref: '#/components/schemas/MemberIdentifier'
        referees:
          type: array
          items:
            $ref: '#/components/schemas/Member'
    
    Gender:
      type: string
      enum: [MALE, FEMALE]
    
    MemberOccupation:
      type: string
      enum: [JUNIOR, SENIOR, SECRETARY, TREASURER, VICE_PRESIDENT, PRESIDENT]