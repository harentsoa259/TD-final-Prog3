openapi: 3.0.3
info:
  title: API Fédération de Collectivités Agricoles de Madagascar
  description: >
    API pour la digitalisation des processus administratifs, financiers et statistiques. 
    Mise à jour du 21 avril 2026 incluant le filtrage strict des membres et les stats fédérales.
  version: 1.1.0
  contact:
    name: Harentsoa - Promotion K (HEI)

servers:
  - url: http://api.federation-agri.mg/v1
    description: Serveur de production

tags:
  - name: Collectivités
    description: Gestion des entités locales
  - name: Membres
    description: Inscriptions et parrainages
  - name: Trésorerie
    description: Comptes et cotisations
  - name: Activités
    description: Planning et assiduité
  - name: Statistiques
    description: Rapports de performance

paths:
  /collectivites:
    post:
      tags: [Collectivités]
      summary: Ouverture d'une nouvelle collectivité
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CollectiviteCreate'
      responses:
        '201':
          description: Créée
    get:
      tags: [Collectivités]
      summary: Liste des collectivités
      responses:
        '200':
          description: OK

  /collectivites/{id}/membres:
    post:
      tags: [Membres]
      summary: Admission d'un nouveau membre (Mise à jour B-2)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MembreAdmission'
      responses:
        '201':
          description: Admis

  /cotisations:
    post:
      tags: [Trésorerie]
      summary: Enregistrer un versement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Cotisation'
      responses:
        '201':
          description: Enregistré

  /activites:
    post:
      tags: [Activités]
      summary: Planifier une activité
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Activite'
      responses:
        '201':
          description: Planifiée

  /activites/{id}/presences:
    post:
      tags: [Activités]
      summary: Enregistrer la présence
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/PresenceEntry'
      responses:
        '200':
          description: Validé

  /stats/federation/rapport-global:
    get:
      tags: [Statistiques]
      summary: Rapport global Fédération (H)
      parameters:
        - name: debut
          in: query
          required: true
          schema: { type: string, format: date }
        - name: fin
          in: query
          required: true
          schema: { type: string, format: date }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FederationStatReport'

components:
  schemas:
    CollectiviteCreate:
      type: object
      required: [nom, numero, ville, specialite, membresFondateurs]
      properties:
        nom: { type: string }
        numero: { type: string }
        ville: { type: string }
        specialite: { type: string }
        membresFondateurs:
          type: array
          items: { type: integer }
          minItems: 10

    MembreAdmission:
      type: object
      required: [nom, prenom, parrainages, paiementInitial]
      properties:
        nom: { type: string }
        prenom: { type: string }
        parrainages:
          type: array
          minItems: 2
          items:
            type: object
            properties:
              parrainId: { type: integer }
              relation: { type: string }
              collectiviteId: { type: integer }
        paiementInitial:
          type: object
          properties:
            fraisAdhesion: { type: number, example: 50000 }
            cotisationAnnuelle: { type: number }

    Cotisation:
      type: object
      required: [membreId, montant, type, modePaiement]
      properties:
        membreId: { type: integer }
        montant: { type: number }
        type: { type: string, enum: [MENSUELLE, ANNUELLE, PONCTUELLE] }
        modePaiement: { type: string, enum: [ESPECE, VIREMENT, MOBILE_MONEY] }

    Activite:
      type: object
      required: [nom, date, type]
      properties:
        nom: { type: string }
        date: { type: string, format: date }
        type: { type: string, enum: [AG_MENSUELLE, FORMATION_JUNIOR, EXCEPTIONNELLE] }
        estObligatoire: { type: boolean }

    PresenceEntry:
      type: object
      properties:
        membreId: { type: integer }
        statut: { type: string, enum: [PRESENT, ABSENT, EXCUSE] }
        motif: { type: string }

    FederationStatReport:
      type: object
      properties:
        collectiviteId: { type: integer }
        tauxAssiduiteGlobal: { type: number }
        pourcentageAJour: { type: number }
        nouveauxAdherents: { type: integer }

